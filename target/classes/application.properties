# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# Database  (override via env vars in production)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─────────────────────────────────────────────
# JWT
# Replace secret with a secure 256-bit key via
# environment variable APP_JWT_SECRET in prod.
# ─────────────────────────────────────────────
app.jwt.secret=Ch@ngeThisSecretIn_Production_MinimumLength32!!
app.jwt.expiration-ms=86400000
